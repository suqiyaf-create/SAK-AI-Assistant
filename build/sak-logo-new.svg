<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradient Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="50%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    
    <!-- Inner Glow -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    
    <!-- Drop Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0ea5e9" flood-opacity="0.4"/>
    </filter>
    
    <!-- Glow Effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main Circle Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Inner Glow Circle -->
  <circle cx="256" cy="256" r="200" fill="url(#innerGlow)"/>
  
  <!-- Decorative Ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- S Letter - Stylized -->
  <path d="M 130 190 
           C 100 190, 90 220, 120 230
           L 160 240
           C 190 248, 190 272, 160 280
           L 120 290
           C 90 300, 100 330, 130 330
           C 160 330, 170 310, 160 295
           L 140 285
           C 210 285, 210 235, 160 220
           L 140 215
           C 170 205, 160 190, 130 190Z" 
        fill="white" 
        filter="url(#glow)"/>
  
  <!-- A Letter - Modern Triangle -->
  <path d="M 210 330 L 256 175 L 302 330 L 275 330 L 265 290 L 247 290 L 237 330 Z
           M 256 220 L 240 270 L 272 270 Z" 
        fill="white" 
        filter="url(#glow)"/>
  
  <!-- K Letter - Sharp Angles -->
  <path d="M 320 175 L 350 175 L 350 245 L 400 175 L 435 175 L 375 255 L 435 330 L 400 330 L 350 265 L 350 330 L 320 330 Z" 
        fill="white" 
        filter="url(#glow)"/>
  
  <!-- AI Dot Accent -->
  <circle cx="400" cy="155" r="12" fill="#7dd3fc" filter="url(#glow)"/>
</svg>
