<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="50%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#glow)"/>
  
  <!-- Inner Circle Border -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
  
  <!-- S Letter -->
  <path d="M 140 180 
           C 100 180, 100 240, 160 240 
           C 220 240, 220 280, 160 280 
           C 100 280, 100 340, 140 340" 
        stroke="white" 
        stroke-width="28" 
        stroke-linecap="round" 
        fill="none"
        filter="url(#glow)"/>
  
  <!-- A Letter -->
  <path d="M 220 340 L 256 180 L 292 340 M 235 280 L 277 280" 
        stroke="white" 
        stroke-width="28" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"
        filter="url(#glow)"/>
  
  <!-- K Letter -->
  <path d="M 330 180 L 330 340 M 330 260 L 400 180 M 330 260 L 400 340" 
        stroke="white" 
        stroke-width="28" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"
        filter="url(#glow)"/>
</svg>
